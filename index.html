<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>River Defense</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --green-dark:  #468432;
    --green-light: #9AD872;
    --yellow:      #FFEF91;
    --orange:      #FFA02E;
    --cream:       #FDFBF0;
    --cream-dark:  #EDE8C8;
    --text:        #2C3E1A;
    --text-mid:    #5A7040;
    --text-light:  #8aA870;
    --white:       #ffffff;
    --shadow:      rgba(70,132,50,0.18);
    --shadow-warm: rgba(255,160,46,0.22);

    /* Fixed heights — edit these to resize bars */
    --top-bar-h:    50px;
    --bottom-bar-h: 170px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--text);
    overflow: hidden;
  }

  /* ══════════════════════════════════════
     LANDING PAGE
  ══════════════════════════════════════ */
  #landing {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--cream);
    z-index: 200; overflow: hidden;
  }
  #landing::before {
    content: ''; position: absolute;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, #9AD87228 0%, transparent 65%);
    top: -200px; left: -200px; pointer-events: none;
  }
  #landing::after {
    content: ''; position: absolute;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, #FFA02E1a 0%, transparent 65%);
    bottom: -80px; right: -80px; pointer-events: none;
  }

  .landing-inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    animation: fadeUp 0.7s ease both;
  }

  @keyframes fadeUp  { from { opacity:0; transform:translateY(28px) } to { opacity:1; transform:translateY(0) } }
  @keyframes fadeOut { to   { opacity:0; pointer-events:none } }
  @keyframes popIn   { from { opacity:0; transform:scale(0.78) } to { opacity:1; transform:scale(1) } }
  @keyframes spin    { to { transform:rotate(360deg) } }
  @keyframes sway    {
    from { transform: rotate(-7deg) translateY(0) }
    to   { transform: rotate(7deg)  translateY(-8px) }
  }

  .leaf-row { display:flex; gap:10px; margin-bottom:20px; animation: fadeUp 0.6s 0.1s ease both; opacity:0; }
  .leaf { font-size:28px; animation: sway 3s ease-in-out infinite alternate; }
  .leaf:nth-child(1){animation-delay:0s}
  .leaf:nth-child(2){animation-delay:.25s}
  .leaf:nth-child(3){animation-delay:.5s; font-size:38px}
  .leaf:nth-child(4){animation-delay:.75s}
  .leaf:nth-child(5){animation-delay:1s}

  .landing-title {
    font-family:'Fredoka One',cursive;
    font-size:clamp(56px,9vw,100px);
    color:var(--green-dark); letter-spacing:2px; line-height:1;
    text-shadow: 3px 5px 0 var(--green-light), 7px 10px 0 rgba(70,132,50,.12);
    animation: fadeUp 0.6s 0.2s ease both; opacity:0;
  }
  .landing-sub {
    font-size:clamp(12px,1.8vw,18px); font-weight:800;
    color:var(--text-mid); letter-spacing:4px; text-transform:uppercase;
    margin-top:12px;
    animation: fadeUp 0.6s 0.32s ease both; opacity:0;
  }
  .landing-desc {
    font-size:clamp(13px,1.3vw,16px); color:var(--text-light);
    font-weight:600; max-width:400px; text-align:center; line-height:1.65;
    margin-top:14px; margin-bottom:38px;
    animation: fadeUp 0.6s 0.44s ease both; opacity:0;
  }
  .btn-play {
    font-family:'Fredoka One',cursive; font-size:22px; letter-spacing:2px;
    color:var(--white);
    background:linear-gradient(140deg,var(--orange) 0%,#e8840a 100%);
    border:none; border-radius:60px; padding:17px 58px; cursor:pointer;
    box-shadow:0 5px 0 #b8600a,0 10px 28px var(--shadow-warm);
    transition:transform .13s,box-shadow .13s;
    animation:fadeUp 0.6s 0.55s ease both; opacity:0;
    text-shadow:0 1px 3px rgba(0,0,0,.18);
  }
  .btn-play:hover { transform:translateY(-4px); box-shadow:0 9px 0 #b8600a,0 16px 36px var(--shadow-warm); }
  .btn-play:active{ transform:translateY(2px);  box-shadow:0 2px 0 #b8600a,0 4px 14px var(--shadow-warm); }

  .badge-row { display:flex; gap:12px; margin-top:36px; animation:fadeUp 0.6s 0.7s ease both; opacity:0; }
  .badge {
    background:var(--white); border:2px solid var(--cream-dark);
    border-radius:14px; padding:10px 16px; text-align:center;
    box-shadow:0 2px 10px var(--shadow);
  }
  .badge-icon { font-size:22px; display:block; }
  .badge-text { font-size:10px; font-weight:800; color:var(--text-mid); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px; }

  .landing-wave { position:absolute; bottom:0; left:0; right:0; height:90px; overflow:hidden; pointer-events:none; }
  .landing-wave svg { width:100%; height:100%; }
  #landing.fade-out { animation:fadeOut 0.48s ease forwards; }

  /* ══════════════════════════════════════
     GAME SCREEN — strict flex column
  ══════════════════════════════════════ */
  #game-screen {
    display: none;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  /* ── TOP BAR — fixed height ── */
  #top-bar {
    flex: 0 0 var(--top-bar-h);
    height: var(--top-bar-h);
    min-height: var(--top-bar-h);
    max-height: var(--top-bar-h);
    display: flex; align-items: center;
    background: var(--green-dark);
    padding: 0 16px;
    box-shadow: 0 3px 14px rgba(46,112,38,.35);
    z-index: 10;
    overflow: hidden;
  }

  #top-bar-title {
    font-family:'Fredoka One',cursive; font-size:21px;
    color:var(--yellow); letter-spacing:1px;
    margin-right:22px; flex-shrink:0;
  }

  .top-stat {
    display:flex; align-items:center; gap:8px;
    padding:0 16px;
    border-left:1px solid rgba(154,216,114,.22);
    height:100%; flex-shrink:0;
  }
  .top-stat-icon { font-size:17px; }
  .top-stat-inner { display:flex; flex-direction:column; line-height:1; }
  .top-stat-label { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--green-light); margin-bottom:2px; }
  .top-stat-value { font-size:15px; font-weight:800; color:var(--yellow); }

  .river-bar-wrap { width:72px; height:5px; background:rgba(255,255,255,.18); border-radius:3px; overflow:hidden; margin-top:3px; }
  .river-bar-fill { height:100%; border-radius:3px; background:var(--green-light); transition:width .3s,background .3s; }

  #btn-next-wave {
    margin-left:auto; font-family:'Fredoka One',cursive; font-size:14px; letter-spacing:1px;
    color:var(--green-dark); background:var(--yellow);
    border:none; border-radius:20px; padding:8px 22px; cursor:pointer;
    box-shadow:0 3px 0 #d4c040,0 5px 14px rgba(255,239,145,.35);
    transition:all .13s; flex-shrink:0;
  }
  #btn-next-wave:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 5px 0 #d4c040,0 10px 22px rgba(255,239,145,.45); }
  #btn-next-wave:disabled { opacity:.38; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ── CANVAS AREA — fills remaining space ── */
  #canvas-wrap {
    flex: 1 1 auto;
    min-height: 0;
    display: flex; align-items: center; justify-content: center;
    background: #daf0c0;
    background-image:
      radial-gradient(ellipse at 25% 35%,#c8e8a033 0%,transparent 55%),
      radial-gradient(ellipse at 75% 65%,#FFEF9118 0%,transparent 55%);
    position: relative; overflow: hidden;
  }

  #game-canvas {
    display:block; border-radius:8px;
    box-shadow:0 6px 40px rgba(46,112,38,.22);
    image-rendering:pixelated; cursor:default;
  }

  /* ── BOTTOM BAR — fixed height ── */
  #bottom-bar {
    flex: 0 0 var(--bottom-bar-h);
    height: var(--bottom-bar-h);
    min-height: var(--bottom-bar-h);
    max-height: var(--bottom-bar-h);
    background: var(--white);
    border-top: 2px solid var(--cream-dark);
    box-shadow: 0 -4px 18px var(--shadow);
    display: flex; flex-direction: column;
    z-index: 10; overflow: hidden;
  }

  /* tabs row */
  #bottom-tabs {
    flex: 0 0 30px; height: 30px;
    display:flex; align-items:stretch;
    border-bottom:1px solid var(--cream-dark);
  }
  .tab-btn {
    font-family:'Nunito',sans-serif; font-weight:800; font-size:10px;
    letter-spacing:1.5px; text-transform:uppercase;
    padding:0 18px; background:none; border:none;
    color:var(--text-light); cursor:pointer;
    border-bottom:3px solid transparent; margin-bottom:-1px;
    transition:all .15s;
  }
  .tab-btn.active  { color:var(--green-dark); border-bottom-color:var(--green-dark); }
  .tab-btn:hover:not(.active){ color:var(--text-mid); }

  /* palette scroll — fills remaining height in bottom-bar */
  #palette-scroll {
    flex: 1 1 auto;
    display:flex; align-items:center;
    gap:8px; padding:8px 12px;
    overflow-x:auto; overflow-y:hidden;
  }
  #palette-scroll::-webkit-scrollbar { height:4px; }
  #palette-scroll::-webkit-scrollbar-track { background:var(--cream-dark); border-radius:2px; }
  #palette-scroll::-webkit-scrollbar-thumb { background:var(--green-light); border-radius:2px; }

  .palette-sep-label {
    flex-shrink:0; font-size:9px; font-weight:800;
    color:var(--text-light); letter-spacing:2px; text-transform:uppercase;
    padding:0 8px; border-left:2px solid var(--cream-dark); margin-left:4px;
    align-self:stretch; display:flex; align-items:center;
  }

  .palette-card {
    flex-shrink:0; display:flex; flex-direction:column; align-items:center;
    gap:3px; padding:8px;
    background:var(--cream); border:2px solid var(--cream-dark);
    border-radius:12px; cursor:pointer; transition:all .14s;
    min-width:100px; max-width:120px;
  }
  .palette-card:hover { border-color:var(--green-dark); background:#f0faec; transform:translateY(-3px); box-shadow:0 5px 16px var(--shadow); }
  .palette-card.selected { border-color:var(--orange); background:#fff8ee; box-shadow:0 4px 14px var(--shadow-warm); transform:translateY(-3px); }
  .palette-card.insufficient { opacity:.38; cursor:not-allowed; }
  .palette-card.insufficient:hover { border-color:var(--cream-dark); background:var(--cream); transform:none; box-shadow:none; }

  .card-img-wrap { width:36px; height:36px; border-radius:8px; background:var(--cream-dark); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .card-img-wrap img { width:100%; height:100%; object-fit:contain; image-rendering:pixelated; }
  .card-img-placeholder { font-size:20px; }
  .card-name  { font-size:10px; font-weight:800; color:var(--text); text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  .card-cost  { font-size:12px; font-weight:800; color:var(--orange); }
  .card-stat  { font-size:9px; font-weight:600; color:var(--text-light); text-align:center; line-height:1.3; }
  /* special badge icons on card */
  .card-tags  { display:flex; gap:3px; flex-wrap:wrap; justify-content:center; margin-top:1px; }
  .card-tag   { font-size:9px; padding:1px 4px; border-radius:4px; font-weight:700; }
  .card-tag.splash { background:#fde8b0; color:#c07000; }
  .card-tag.slow   { background:#c8e8ff; color:#0055aa; }

  /* info panel — replaces palette when tab active */
  #info-panel-wrap {
    display:none; flex-direction:column; gap:4px;
    padding:8px 14px 8px; flex:1; overflow-y:auto;
    background:#f4fbee; border-left:3px solid var(--green-light);
  }
  #info-panel-wrap.visible { display:flex; }

  #info-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
  #info-panel-title  { font-family:'Fredoka One',cursive; font-size:16px; color:var(--green-dark); }
  #btn-close-info    { font-size:10px; font-weight:800; letter-spacing:1px; color:var(--text-light); text-transform:uppercase; background:none; border:none; cursor:pointer; }
  #btn-close-info:hover { color:var(--text); }

  .info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:2px 14px; }
  .info-row  { display:flex; justify-content:space-between; font-size:11px; gap:8px; }
  .info-key  { color:var(--text-light); font-weight:600; }
  .info-val  { color:var(--text); font-weight:800; }
  .info-val.next { color:var(--green-dark); }

  #btn-upgrade {
    font-family:'Fredoka One',cursive; font-size:13px; letter-spacing:1px;
    color:var(--white); background:linear-gradient(135deg,var(--green-dark),#357026);
    border:none; border-radius:14px; padding:6px 18px; cursor:pointer;
    box-shadow:0 2px 0 #2a5a1e,0 4px 10px var(--shadow);
    transition:all .12s; align-self:flex-start; margin-top:2px;
  }
  #btn-upgrade:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 4px 0 #2a5a1e,0 8px 18px var(--shadow); }
  #btn-upgrade:disabled { opacity:.32; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ── OVERLAY ── */
  #overlay {
    position:absolute; inset:0;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(240,248,230,.86); z-index:50; backdrop-filter:blur(6px);
  }
  #overlay.visible { display:flex; }
  #overlay-box {
    background:var(--white); border:3px solid var(--cream-dark);
    border-radius:24px; padding:38px 50px; text-align:center; max-width:400px;
    box-shadow:0 14px 50px var(--shadow); animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
  }
  #overlay-emoji { font-size:54px; margin-bottom:10px; display:block; }
  #overlay-title { font-family:'Fredoka One',cursive; font-size:36px; letter-spacing:2px; margin-bottom:16px; }
  #overlay-title.win  { color:var(--green-dark); }
  #overlay-title.lose { color:#c0392b; }
  .overlay-stat { font-size:14px; font-weight:700; color:var(--text-mid); margin-bottom:8px; }
  .overlay-stat span { color:var(--text); font-weight:800; }
  #btn-restart {
    margin-top:22px; font-family:'Fredoka One',cursive; font-size:18px; letter-spacing:1px;
    color:var(--white); background:linear-gradient(135deg,var(--orange),#e8840a);
    border:none; border-radius:30px; padding:12px 36px; cursor:pointer;
    box-shadow:0 4px 0 #b8600a,0 8px 20px var(--shadow-warm); transition:all .13s;
  }
  #btn-restart:hover { transform:translateY(-2px); box-shadow:0 6px 0 #b8600a,0 12px 26px var(--shadow-warm); }

  /* ── SIDE INFO PANEL ── */
  #side-panel {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 220px;
    background: rgba(253,251,240,0.97);
    border-left: 2.5px solid var(--green-light);
    box-shadow: -6px 0 24px rgba(70,132,50,0.16);
    display: none;
    flex-direction: column;
    gap: 9px;
    padding: 13px 13px 16px;
    z-index: 20;
    overflow-y: auto;
  }
  #side-panel.visible { display: flex; animation: spSlide .18s ease; }
  @keyframes spSlide {
    from { transform: translateX(18px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  #sp-header { display: flex; align-items: flex-start; gap: 9px; }
  #sp-img-wrap {
    width: 54px; height: 54px; flex-shrink: 0;
    background: var(--cream-dark); border-radius: 12px;
    border: 2px solid var(--green-light);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #sp-img { width: 100%; height: 100%; object-fit: contain; }
  #sp-img-fallback { font-size: 28px; }
  #sp-title-col { flex: 1; min-width: 0; padding-top: 1px; }
  #sp-name {
    font-family: 'Fredoka One', cursive; font-size: 15px;
    color: var(--green-dark); line-height: 1.15;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #sp-type-badge {
    font-size: 9px; font-weight: 800; letter-spacing: 1.4px;
    text-transform: uppercase; color: var(--text-light); margin-top: 1px;
  }
  #sp-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
  #sp-close {
    flex-shrink: 0; font-size: 12px; font-weight: 800; color: var(--text-light);
    background: none; border: none; cursor: pointer; padding: 2px 5px;
    border-radius: 6px; line-height: 1; transition: background .12s, color .12s;
    margin-top: -1px;
  }
  #sp-close:hover { background: var(--cream-dark); color: var(--text); }

  #sp-desc {
    font-size: 11px; color: var(--text-mid); font-weight: 600;
    line-height: 1.55; background: var(--cream-dark);
    border-radius: 8px; padding: 7px 9px; margin: 0;
    display: none;
  }
  #sp-desc.has-text { display: block; }

  #sp-divider { height: 1px; background: var(--cream-dark); }

  #sp-stats { display: flex; flex-direction: column; gap: 1px; }

  #sp-upgrade-btn {
    font-family: 'Fredoka One', cursive; font-size: 13px; letter-spacing: 1px;
    color: var(--white); background: linear-gradient(135deg, var(--green-dark), #357026);
    border: none; border-radius: 14px; padding: 8px 0; cursor: pointer;
    box-shadow: 0 2px 0 #2a5a1e, 0 4px 10px var(--shadow);
    transition: all .12s; margin-top: 2px;
  }
  #sp-upgrade-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 0 #2a5a1e, 0 8px 18px var(--shadow); }
  #sp-upgrade-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── LOADING ── */
  #loading-screen {
    position:fixed; inset:0; background:var(--cream);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:300; gap:16px;
  }
  #loading-screen h2 { font-family:'Fredoka One',cursive; font-size:28px; letter-spacing:2px; color:var(--green-dark); }
  #loading-msg { font-size:12px; font-weight:600; color:var(--text-light); letter-spacing:1px; min-height:18px; }
  .spinner { width:36px; height:36px; border:3px solid var(--cream-dark); border-top-color:var(--green-dark); border-radius:50%; animation:spin .8s linear infinite; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="spinner"></div>
  <h2>River Defense</h2>
  <div id="loading-msg">Loading data files...</div>
</div>

<!-- LANDING -->
<div id="landing" style="display:none">
  <div class="landing-inner">
    <div class="leaf-row">
      <span class="leaf">🌿</span><span class="leaf">🍃</span>
      <span class="leaf">🌳</span><span class="leaf">🍃</span><span class="leaf">🌿</span>
    </div>
    <h1 class="landing-title">River Defense</h1>
    <p class="landing-sub">Tower Defense</p>
    <p class="landing-desc">
      Waves of trash are marching toward the river.<br>
      Build shooters, grow generators, hold the line.
    </p>
    <button class="btn-play" id="btn-go-play">▶ &nbsp;Play Now</button>
    <div class="badge-row">
      <div class="badge"><span class="badge-icon">⚡</span><div class="badge-text">Shooters</div></div>
      <div class="badge"><span class="badge-icon">💥</span><div class="badge-text">Splash</div></div>
      <div class="badge"><span class="badge-icon">❄️</span><div class="badge-text">Slow</div></div>
      <div class="badge"><span class="badge-icon">🌊</span><div class="badge-text">Defend River</div></div>
    </div>
  </div>
  <div class="landing-wave">
    <svg viewBox="0 0 1440 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,45 C240,85 480,5 720,45 C960,85 1200,5 1440,45 L1440,90 L0,90 Z" fill="#9AD87240"/>
      <path d="M0,60 C360,20 720,80 1080,35 C1260,12 1380,60 1440,60 L1440,90 L0,90 Z" fill="#46843230"/>
    </svg>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">

  <!-- TOP BAR -->
  <div id="top-bar">
    <div id="top-bar-title">🌊 River Defense</div>
    <div class="top-stat">
      <span class="top-stat-icon">📡</span>
      <div class="top-stat-inner">
        <span class="top-stat-label">Wave</span>
        <span class="top-stat-value" id="ui-wave">0 / 0</span>
      </div>
    </div>
    <div class="top-stat">
      <span class="top-stat-icon">💧</span>
      <div class="top-stat-inner">
        <span class="top-stat-label">River HP</span>
        <span class="top-stat-value" id="ui-river-hp">—</span>
        <div class="river-bar-wrap"><div class="river-bar-fill" id="ui-river-bar" style="width:100%"></div></div>
      </div>
    </div>
    <div class="top-stat">
      <span class="top-stat-icon">💰</span>
      <div class="top-stat-inner">
        <span class="top-stat-label">Bank</span>
        <span class="top-stat-value" id="ui-bank">$0</span>
      </div>
    </div>
    <button id="btn-next-wave">▶ Start Wave</button>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <!-- SIDE INFO PANEL -->
    <div id="side-panel">
      <div id="sp-header">
        <div id="sp-img-wrap">
          <img id="sp-img" src="" alt="" style="display:none">
          <span id="sp-img-fallback" style="display:none"></span>
        </div>
        <div id="sp-title-col">
          <div id="sp-name">—</div>
          <div id="sp-type-badge"></div>
          <div id="sp-tags"></div>
        </div>
        <button id="sp-close" title="Deselect">✕</button>
      </div>
      <p id="sp-desc"></p>
      <div id="sp-divider"></div>
      <div id="sp-stats"></div>
      <button id="sp-upgrade-btn">Upgrade</button>
    </div>

    <div id="overlay">
      <div id="overlay-box">
        <span id="overlay-emoji">🌿</span>
        <div id="overlay-title">—</div>
        <div id="overlay-stats"></div>
        <button id="btn-restart">↩ Play Again</button>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottom-bar">
    <div id="bottom-tabs">
      <button class="tab-btn active" id="tab-towers" onclick="showTab('towers')">⚡ Towers</button>
      <button class="tab-btn" id="tab-info" onclick="showTab('info')" style="display:none">📋 Selected</button>
    </div>
    <div id="palette-scroll"><!-- JS populated --></div>
    <div id="info-panel-wrap">
      <div id="info-panel-header">
        <div id="info-panel-title">—</div>
        <button id="btn-close-info">✕ Deselect</button>
      </div>
      <div class="info-grid" id="info-rows"></div>
      <button id="btn-upgrade">Upgrade</button>
    </div>
  </div>

</div>

<script>
  function showTab(tab) {
    document.getElementById('tab-towers').classList.toggle('active', tab === 'towers');
    document.getElementById('tab-info').classList.toggle('active',   tab === 'info');
    document.getElementById('palette-scroll').style.display    = tab === 'towers' ? 'flex' : 'none';
    document.getElementById('info-panel-wrap').classList.toggle('visible', tab === 'info');
  }

  document.getElementById('btn-go-play').addEventListener('click', () => {
    const landing = document.getElementById('landing');
    landing.classList.add('fade-out');
    setTimeout(() => {
      landing.style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      if (typeof resizeCanvas === 'function') resizeCanvas();
    }, 480);
  });
</script>
<script src="game.js"></script>
</body>
</html>
